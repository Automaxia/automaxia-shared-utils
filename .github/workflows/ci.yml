name: CI — Automaxia Shared Utils

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main

jobs:
  # ── Job 1: Testes Unitários ──────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Executar testes unitários (pytest)
        env:
          ENVIRONMENT: testing
          ADMIN_CENTER_URL: http://fake:8000/api
          ADMIN_CENTER_API_KEY: fake-ci-key
          ADMIN_CENTER_PRODUCT_ID: ci-prod
          ADMIN_CENTER_ENVIRONMENT_ID: ci-env
          ADMIN_CENTER_ORGANIZATION_ID: ci-org
          SECRET_KEY: ci-test-secret-key-minimum-32-chars
        run: pytest tests/ -v --tb=short

  # ── Job 2: Verificar instalação como pacote ─────────────────────────────────
  package:
    name: Package Install Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar como pacote
        run: |
          pip install -e .
          python -c "from automaxia_utils import AdminCenterService; print('Import OK')"

      - name: Instalar com extras
        run: |
          pip install -e ".[all]" || true
          python -c "import automaxia_utils; print(f'Version: {automaxia_utils.__version__}')"
